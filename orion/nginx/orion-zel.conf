limit_req_zone $binary_remote_addr zone=zel_limit:10m rate=30r/m;

server {
    listen 80 default_server;
    server_name orion.blackgroup-bia.shop;

    access_log /var/log/nginx/orion-zel.access.log;
    error_log  /var/log/nginx/orion-zel.error.log warn;

    add_header X-Frame-Options          "DENY" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","host":"orion","ts":"$time_iso8601"}';
    }

    # Webhook fanout — Evolution sends here, nginx mirrors to all gateways
    # Each gateway filters by ALLOWED_PHONES in its .env
    location /webhook/ {
        mirror /adonai/;
        mirror /simon/;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
    }

    # Adonai bridge (Evolution gateway)
    location /adonai/ {
        limit_req zone=zel_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Zel-Identity    adonai;
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # Simon bridge (Evolution gateway)
    location /simon/ {
        limit_req zone=zel_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Zel-Identity    simon;
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # Zel 3 (slot futuro)
    location /zel3/ {
        limit_req zone=zel_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Zel-Identity    zel3;
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # Paperclip Orion UI (F4)
    location /orion/ {
        proxy_pass http://127.0.0.1:3100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Hermes Dashboard — Adonai (HTML + assets with path rewriting)
    location /hermes/adonai/ {
        proxy_pass http://127.0.0.1:9119/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost:9119;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        sub_filter_once off;
        sub_filter "href=\"/" "href=\"/hermes/adonai/";
        sub_filter "src=\"/" "src=\"/hermes/adonai/";
        sub_filter "__HERMES_BASE_PATH__=\"\"" "__HERMES_BASE_PATH__=\"/hermes/adonai\"";
    }

    # Hermes Dashboard API + WebSocket (paths hardcoded in JS)
    location /api/ {
        proxy_pass http://127.0.0.1:9119/api/;
        proxy_http_version 1.1;
        proxy_set_header Host localhost:9119;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Default catch-all
    location / {
        default_type application/json;
        return 404 '{"error":"unknown route","hint":"use /adonai, /simon, /hermes/adonai/, or /health"}';
    }
}
